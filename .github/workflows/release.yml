name: Create Release
on:
  push:
    branches:
      - "release/**"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trigger branch
        uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME#release/}"
          if [ -f "RELEASE_NOTES.md" ]; then
            NOTES_FLAG="--notes-file RELEASE_NOTES.md"
          else
            NOTES_FLAG="--generate-notes"
          fi
          if echo "$TAG" | grep -qE 'b[0-9]+'; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG=""
          fi
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --target "main" \
            --title "$TAG" \
            $NOTES_FLAG \
            $PRERELEASE_FLAG
      - name: Delete trigger branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${GITHUB_REF_NAME}" || true
