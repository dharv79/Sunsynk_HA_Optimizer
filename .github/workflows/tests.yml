name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        run: pip install pytest
      - name: Compile check
        run: python -m py_compile custom_components/sunsynk_optimizer/*.py
      - name: Run tests
        run: python -m pytest
